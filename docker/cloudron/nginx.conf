# Tight Books — Cloudron nginx configuration
# nginx listens on 3000 (Cloudron httpPort), proxies /api to NestJS on 3002.
server {
    listen 3000;
    server_name _;

    # Static webapp (React SPA) — long-lived cache for hashed assets
    location / {
        root /app/public/webapp;
        try_files $uri /index.html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached so SPA updates deploy cleanly
    location = /index.html {
        root /app/public/webapp;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API — proxied to the NestJS backend
    location /api {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }
}
