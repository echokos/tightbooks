name: Deploy to Cloudron
on:
  push:
    branches: [develop]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/echokos/tightbooks:latest
            ghcr.io/echokos/tightbooks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/echokos/packages/container/tightbooks" \
            -d '{"visibility":"public"}' || true
      - name: Deploy to Cloudron via API
        env:
          IMAGE: ghcr.io/echokos/tightbooks:${{ github.sha }}
          CLOUDRON_SERVER: ${{ secrets.CLOUDRON_SERVER }}
          CLOUDRON_APP_ID: ${{ secrets.CLOUDRON_APP_ID }}
          CLOUDRON_TOKEN: ${{ secrets.CLOUDRON_TOKEN }}
        run: |
          BODY=$(jq -n \
            --arg image "$IMAGE" \
            '{
              manifest: {
                id: "app.tightbooks",
                title: "Tight Books",
                version: "0.1.0",
                tagline: "Self-hosted double-entry bookkeeping for small business",
                httpPort: 3000,
                addons: {mysql: {}, redis: {}, email: {}},
                healthCheckPath: "/api/system_db",
                minBoxVersion: "7.0.0",
                manifestVersion: 2,
                dockerImage: $image
              }
            }')
          curl -sf -X POST "$CLOUDRON_SERVER/api/v1/apps/$CLOUDRON_APP_ID/update" \
            -H "Authorization: Bearer $CLOUDRON_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY"
