name: Deploy to Cloudron

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/echokos/tightbooks:latest
            ghcr.io/echokos/tightbooks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloudron
        run: |
          IMAGE="ghcr.io/echokos/tightbooks:${{ github.sha }}"
          MANIFEST=$(python3 -c "
          import json
          with open('CloudronManifest.json') as f:
              m = json.load(f)
          import os
          m['dockerImage'] = os.environ['IMAGE']
          print(json.dumps(m))
          " IMAGE="$IMAGE")

          # Retry up to 10 times with 30s delay to handle Cloudron busy (409)
          for attempt in $(seq 1 10); do
            HTTP=$(curl -s -o /tmp/cr_response.json -w "%{http_code}" \
              -X POST "${{ secrets.CLOUDRON_SERVER }}/api/v1/apps/${{ secrets.CLOUDRON_APP_ID }}/update" \
              -H "Authorization: Bearer ${{ secrets.CLOUDRON_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"manifest\": $MANIFEST}")
            echo "Attempt $attempt: HTTP $HTTP"
            cat /tmp/cr_response.json
            if [ "$HTTP" = "202" ] || [ "$HTTP" = "200" ]; then
              echo "Deploy triggered successfully."
              exit 0
            elif [ "$HTTP" = "409" ]; then
              echo "Cloudron busy, waiting 30s..."
              sleep 30
            else
              echo "Unexpected response: $HTTP"
              exit 1
            fi
          done
          echo "Deploy timed out after retries."
          exit 1
