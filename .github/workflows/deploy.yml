name: Deploy to Cloudron
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/echokos/tightbooks:latest
            ghcr.io/echokos/tightbooks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Make package public
        continue-on-error: true
        run: |
          gh api --method PATCH /user/packages/container/tightbooks \
            -f visibility=public \
            -H "Accept: application/vnd.github+json" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to Cloudron
        continue-on-error: true
        run: |
          npm install -g cloudron
          cloudron login ${{ secrets.CLOUDRON_SERVER }} --token ${{ secrets.CLOUDRON_TOKEN }}
          cloudron update --app ${{ secrets.CLOUDRON_APP_ID }} --image ghcr.io/echokos/tightbooks:${{ github.sha }}

