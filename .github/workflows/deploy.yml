name: Deploy to Cloudron
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/echokos/tightbooks:latest
            ghcr.io/echokos/tightbooks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Cloudron via API
        run: |
          IMAGE="ghcr.io/echokos/tightbooks:${{ github.sha }}"
          MANIFEST=$(cat <<JSON
          {
            "id": "app.tightbooks",
            "title": "Tight Books",
            "version": "0.1.0",
            "tagline": "Self-hosted double-entry bookkeeping for small business",
            "httpPort": 3000,
            "addons": {"mysql": {}, "redis": {}},
            "healthCheckPath": "/api/system_db",
            "minBoxVersion": "7.0.0",
            "manifestVersion": 2,
            "dockerImage": "${IMAGE}"
          }
          JSON
          )
          curl -sf -X POST "${{ secrets.CLOUDRON_SERVER }}/api/v1/apps/${{ secrets.CLOUDRON_APP_ID }}/update" \
            -H "Authorization: Bearer ${{ secrets.CLOUDRON_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"manifest\": $(echo $MANIFEST)}"

