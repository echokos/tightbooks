name: Deploy to Cloudron

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/echokos/tightbooks:latest
            ghcr.io/echokos/tightbooks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloudron
        run: |
          IMAGE="ghcr.io/echokos/tightbooks:${{ github.sha }}"
          MANIFEST=$(python3 -c "
          import json
          with open('CloudronManifest.json') as f:
              m = json.load(f)
          m['dockerImage'] = '$IMAGE'
          print(json.dumps(m))
          ")
          curl -sf -X POST "${{ secrets.CLOUDRON_SERVER }}/api/v1/apps/${{ secrets.CLOUDRON_APP_ID }}/update" \
            -H "Authorization: Bearer ${{ secrets.CLOUDRON_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"manifest\": $MANIFEST}"
